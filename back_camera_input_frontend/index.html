<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>back-camera-input</title>
    <script src="./streamlit-component-lib.js"></script>
    <link rel="stylesheet" href="./style.css" />
    <script src="./main.js"></script>
  </head>
  <body>
    <div id="container">
      <p id="platform-hint"></p>

      <label id="native-capture" class="primary-btn">
        <span id="native-capture-label">📷 アウトカメラで撮影</span>
        <input id="file-input-back" type="file" accept="image/*" capture="environment" />
      </label>

      <details id="preview-section">
        <summary>プレビューで撮影する（うまくいかない場合は上のボタンを使用）</summary>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" hidden></canvas>
        <div id="controls">
          <button id="capture-btn" type="button">撮影</button>
          <button id="flip-btn" type="button">アウトカメラに切替</button>
        </div>
      </details>

      <p id="hint"></p>
      <p id="error" hidden></p>
    </div>
  </body>
</html>
